name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Format, build, and test
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Check formatting, build, and tests
        run: ./scripts/check.sh --full

      - name: Agent reliability eval (fake)
        run: |
          zig build
          ./scripts/eval_reliability.sh --provider fake --min-success-rate 0.66

      - name: Smoke test CLI
        run: |
          zig build run -- version
          zig build run -- doctor
