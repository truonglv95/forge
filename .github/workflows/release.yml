name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build and Package macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        run: |
          ZIG_VERSION="0.16.0"
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/zig-macos-aarch64-${ZIG_VERSION}.tar.xz"
          curl -fsSL "$ZIG_URL" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$(pwd)/zig-macos-aarch64-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and Package (unsigned DMG)
        env:
          FORGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          chmod +x scripts/package-mac.sh
          bash scripts/package-mac.sh --dmg

      - name: Compute SHA256
        id: sha
        run: |
          DMG="zig-out/Forge-${{ steps.version.outputs.version }}-arm64.dmg"
          if [ ! -f "$DMG" ]; then
            DMG=$(ls zig-out/Forge-*.dmg 2>/dev/null | head -1)
          fi
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "dmg_path=$DMG" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$(basename $DMG)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Forge IDE ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}
          body: |
            ## Forge IDE ${{ steps.version.outputs.version }}

            ### Installation
            1. Download the `.dmg` file below
            2. Open the DMG and drag **Forge IDE** to Applications
            3. Right-click the app and select Open (first launch on unsigned build)

            ### SHA256 Checksums
            ```
            ${{ steps.sha.outputs.sha256 }}  ${{ steps.sha.outputs.dmg_name }}
            ```

            ### Changelog
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          files: ${{ steps.sha.outputs.dmg_path }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forge-ide-macos-${{ steps.version.outputs.version }}
          path: |
            zig-out/Forge-*.dmg
            zig-out/stage/
          retention-days: 30
