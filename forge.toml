# Forge workspace configuration.
# The supported M0 schema is intentionally small and strict.

[project]
name = "forge"

[editor]
tab_width = 4

[theme]
preset = "dark"
# CSS-style font stack — first available font wins
font_family = "Menlo, Monaco, 'Courier New', monospace"
font_size = 14
font_weight = "regular"
line_height = 1.5
ui_font_size = 12

[ai]
# AI edits must remain review-only. Direct apply is not a supported mode.
apply_mode = "review"
# Provider: auto | fake | gemini | ollama
# auto prefers Gemini credentials, then Ollama, then fake
provider = "gemini"
model = "gemini-2.5-flash"
# Enable MCP tools from .mcp.json (Cursor / VS Code compatible format)
mcp = true
# model = "qwen2.5-coder:7b"  # ollama
