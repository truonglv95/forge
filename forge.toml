# Forge workspace configuration.
# The supported M0 schema is intentionally small and strict.

[project]
name = "forge"

[editor]
tab_width = 4

[theme]
preset = "dark"
# CSS-style font stack — first available font wins
font_family = "Menlo, Monaco, 'Courier New', monospace"
font_size = 14
font_weight = "regular"
line_height = 1.5
ui_font_size = 12

[ai]
# AI edits must remain review-only. Direct apply is not a supported mode.
apply_mode = "review"
# Provider: auto | fake | gemini | ollama | openrouter
# auto prefers Ollama when reachable, then Gemini credentials, then fake
provider = "ollama"
model = "qwen3.5:35b"
# Ollama server URL. Change this to a remote server when local Ollama is unavailable.
ollama_url = "http://localhost:11434"
# Optional OpenRouter-compatible base URL. Requires OPENROUTER_API_KEY when provider = "openrouter".
openrouter_url = "https://openrouter.ai/api/v1"
# Embedding provider is configured separately from the chat model. It may reuse
# the same Ollama host, but should use an embedding model.
embedding_provider = "ollama"
embedding_model = "nomic-embed-text"
embedding_url = "http://localhost:11434"
# Enable MCP tools from .mcp.json (Cursor / VS Code compatible format)
mcp = true
