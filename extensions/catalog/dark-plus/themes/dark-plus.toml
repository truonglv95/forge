# Dark+ theme (VS Code inspired)
# Colors are in RGB float [0.0, 1.0]

[workbench]
bg = [0.117, 0.117, 0.117, 1.0]
header_bg = [0.2, 0.2, 0.2, 1.0]
activity_bg = [0.2, 0.2, 0.2, 1.0]
sidebar_bg = [0.125, 0.125, 0.13, 1.0]
editor_bg = [0.117, 0.117, 0.117, 1.0]

[editor]
text = [0.88, 0.9, 0.94, 1.0]
text_secondary = [0.72, 0.76, 0.82, 1.0]
text_muted = [0.6, 0.6, 0.65, 1.0]
cursor = [0.8, 0.8, 0.8, 1.0]
selection = [0.2, 0.3, 0.5, 0.5]
line_highlight = [0.15, 0.15, 0.15, 1.0]

[syntax]
