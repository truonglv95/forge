string = [0.94, 0.63, 0.38, 1.0]
comment = [0.46, 0.58, 0.6, 1.0]
function = [0.93, 0.85, 0.43, 1.0]
type = [0.43, 0.83, 0.93, 1.0]
variable = [0.88, 0.9, 0.94, 1.0]
number = [0.94, 0.63, 0.38, 1.0]
operator = [0.88, 0.9, 0.94, 1.0]

[agent]
